<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="TrustBook" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      id="tb-meta-description"
      name="description"
      content="TrustBook — prenotazioni affidabili con attività locali, caparra opzionale e profili verificabili."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TrustBook" />
    <meta property="og:title" content="TrustBook — Prenotazioni anti no-show" />
    <meta property="og:description" content="Prenotazioni affidabili con attività locali, caparra opzionale e profili verificabili." />
    <meta property="og:image" content="/og-default.png" />
    <meta property="og:locale" content="it_IT" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TrustBook — Prenotazioni anti no-show" />
    <meta name="twitter:description" content="Caparra intelligente, reputazione, ordine. Per attività e clienti." />
    <meta name="twitter:image" content="/og-default.png" />
    <title>TrustBook — Prenotazioni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="boot" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b1220;color:#e6eaf2;font-family:'Plus Jakarta Sans',system-ui,sans-serif;">
      <div style="max-width:520px;padding:28px;border:1px solid rgba(255,255,255,0.1);border-radius:22px;background:rgba(255,255,255,0.04);box-shadow:0 24px 60px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.06);">
        <div style="font-weight:700;font-size:15px;letter-spacing:-0.02em;">TrustBook</div>
        <div style="margin-top:6px;font-size:13px;opacity:0.8;">Caricamento…</div>
        <div id="boot-details" style="margin-top:10px;font-size:12px;opacity:0.65;"></div>
      </div>
    </div>
    <script>
      (function () {
        var details = document.getElementById('boot-details')
        var show = function (title, msg) {
          var boot = document.getElementById('boot')
          if (!boot) return
          boot.style.background = '#120707'
          boot.querySelector('div').style.borderColor = 'rgba(239,68,68,0.35)'
          boot.querySelector('div').style.background = 'rgba(239,68,68,0.10)'
          boot.querySelector('div').children[1].textContent = title
          if (details) details.textContent = msg
        }
        window.addEventListener('error', function (e) {
          var msg = String(e && e.message ? e.message : e)
          try {
            var t = e && e.target
            if (t && t.tagName === 'SCRIPT' && t.src) {
              msg = msg + ' | src=' + t.src
            }
          } catch (_) {}
          show('Errore caricamento', msg)
        }, true)
        window.addEventListener('unhandledrejection', function (e) {
          var reason = e && e.reason ? e.reason : e
          show('Errore caricamento', String(reason && reason.message ? reason.message : reason))
        })

        try {
          var scripts = document.querySelectorAll('script[type="module"][src]')
          if (scripts && scripts.length) {
            var src = scripts[0].getAttribute('src')
            if (details && src) details.textContent = 'Script: ' + src

            Promise.all(
              Array.prototype.map.call(scripts, function (s) {
                var u = s.getAttribute('src')
                if (!u) return Promise.resolve(null)
                return fetch(u, { method: 'GET', cache: 'no-store' })
                  .then(function (r) {
                    return {
                      url: u,
                      ok: r.ok,
                      status: r.status,
                      contentType: r.headers.get('content-type') || '',
                    }
                  })
                  .catch(function (err) {
                    return { url: u, ok: false, status: -1, contentType: '', error: String(err) }
                  })
              }),
            ).then(function (results) {
              var bad = (results || []).filter(function (r) {
                if (!r) return false
                return !r.ok || (r.contentType && r.contentType.indexOf('text/html') !== -1)
              })
              if (bad.length) {
                show(
                  'Errore caricamento',
                  bad
                    .map(function (r) {
                      return r.url + ' status=' + r.status + ' ct=' + (r.contentType || '—')
                    })
                    .join(' | '),
                )
              }
            })
          }
        } catch (_) {}
        setTimeout(function () {
          var boot = document.getElementById('boot')
          if (!boot) return
          if (details) details.textContent = 'Se resta bloccato, fai refresh (Ctrl+F5).'
        }, 2500)
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
