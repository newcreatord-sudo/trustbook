<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <title>Password modificata</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f1f5f9;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;">
          <tr>
            <td style="padding:28px 28px 20px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#f8fafc;">
              <p style="margin:0;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.85;">TrustBook — sicurezza</p>
              <h1 style="margin:10px 0 0;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:20px;line-height:1.25;font-weight:600;">
                Password aggiornata
              </h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.55;color:#334155;">
              <p style="margin:0 0 16px;">
                La password dell&apos;account <strong>{{ .Email }}</strong> è stata modificata con successo.
              </p>
              <p style="margin:0;font-size:13px;color:#b45309;line-height:1.45;">
                Se non sei stato tu, reimposta subito la password e verifica le sessioni attive dal tuo account.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px 24px;border-top:1px solid #f1f5f9;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#94a3b8;line-height:1.45;">
              <p style="margin:0;">Messaggio automatico · TrustBook</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
