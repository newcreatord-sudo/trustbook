name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Migrations integrity
        run: npm run check:migrations:integrity

      - name: Tests integrity
        run: npm run check:tests:integrity

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Google Maps bundle budget
        run: npm run check:bundle:google-maps
