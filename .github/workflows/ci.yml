name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Migrations integrity
        run: npm run check:migrations:integrity

      - name: Tests
        run: npm run test -- --exclude api/routes/stripe.test.ts

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging' || github.base_ref == 'staging'
    timeout-minutes: 20
    env:
      E2E_BASE_URL: https://trustbook-k4sn.vercel.app
      E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
      E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
      E2E_CUSTOMER_EMAIL: ${{ secrets.E2E_CUSTOMER_EMAIL }}
      E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD }}
      E2E_BOOKING_BUSINESS_SLUG: ${{ secrets.E2E_BOOKING_BUSINESS_SLUG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright
        run: npm run e2e:install

      - name: E2E
        run: npm run e2e
