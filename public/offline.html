<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>Sei offline · TrustBook</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; min-height: 100vh; }
      body {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background:
          radial-gradient(ellipse 125% 85% at 50% -25%, rgba(79, 124, 255, 0.22), transparent 52%),
          linear-gradient(180deg, #070d18 0%, #0b1220 100%);
        color: #e8ecf4;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 480px;
        width: 100%;
        background: rgba(255, 255, 255, 0.045);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }
      h1 { font-size: 20px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
      p { color: rgba(255, 255, 255, 0.7); font-size: 14px; line-height: 1.55; margin: 6px 0; }
      .actions { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
      .btn {
        flex: 1 1 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 16px;
        padding: 12px 16px;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease;
        border: 0;
      }
      .btn-primary { background: #4f7cff; color: white; }
      .btn-primary:hover { background: #6a90ff; }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
      .meta { margin-top: 16px; font-size: 12px; color: rgba(255, 255, 255, 0.5); }
    </style>
  </head>
  <body>
    <main class="card" role="alert">
      <h1>Sei offline</h1>
      <p>
        Non è disponibile una connessione. Le pagine pubbliche già visitate restano consultabili: le
        prenotazioni in corso e le modifiche vengono sincronizzate appena torni online.
      </p>
      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="window.location.reload()">Riprova</button>
        <a class="btn btn-secondary" href="/">Torna alla home</a>
      </div>
      <div class="meta">TrustBook · modalità offline</div>
    </main>
  </body>
</html>
